# Kconfig overrides for the crabulik_console shield.
#
# Zephyr/ZMK automatically merges this file into the build whenever the shield
# is "crabulik_console" (found via ZMK_CONFIG=/work/config + SHIELD name).
# It currently sets no overrides — the defaults are fine for this board.

# --- USB serial logging (debugging) -----------------------------------------
# Logging is intentionally NOT enabled here.
#
# On current ZMK (Zephyr 4.1+) USB logging is provided by the `zmk-usb-logging`
# snippet, which adds BOTH the Kconfig (CONFIG_ZMK_USB_LOGGING) and the required
# CDC-ACM devicetree node on zephyr_udc0. Setting CONFIG_ZMK_USB_LOGGING=y here
# on its own FAILS to build on nice_nano (no CDC-ACM node -> fatal Kconfig error).
#
# Build a logging image on demand instead:
#     .\scripts\build.ps1 -Logging   # -> firmware\crabulik_console-nice_nano-logging.uf2
#
# See docs/BUILD.md -> "Reading logs (USB serial)".

# --- Rotary encoders (EC11 knob + mouse wheel) ------------------------------
# Both encoders use ZMK's EC11 incremental sensor driver and are bound to plain
# key presses in the keymap (volume / tab-switching), so no pointing/mouse
# subsystem is needed. Harmless if the encoders aren't physically populated yet:
# unconnected inputs idle high (internal pull-ups) and simply produce no events.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
